    <meta charset="UTF-8" />

    <title>Document</title>
    <style>
      body {
        overflow-x: hidden !important;
      }
      .stretch-bg {
        position: relative;
      }

      .stretch-bg::before {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100vw;
        height: 100%;
        background: #97daff;
        z-index: -1;
      }
      .cropped-banner-container {
        position: relative;
        overflow: unset !important;
      }
      .decor-balloon {
        position: absolute;
        bottom: -350px;
        right: -50px;
        pointer-events: none;
        width: clamp(380px, 70vw, 888px);
      }
      .birthday-sale-header {
        display: flex;
        align-items: center;
        flex-direction: column;
        padding-bottom: 12px;
      }
      /* timer css */
      .timer {
        display: flex;
        align-items: center;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: linear-gradient(117deg, rgba(226, 239, 255, 0.36) 0.74%, rgba(226, 239, 255, 0.12) 111.76%);
        backdrop-filter: blur(4px);
        padding: 5px 15px;
        gap: 12px;
        position: relative;
        justify-content: center;
        width: fit-content;
      }
      .unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        position: relative;
      }
      .unit:not(:last-child)::after {
        content: "";
        position: absolute;
        right: -7px;
        width: 1px;
        height: 35px;
        background: rgba(255, 255, 255, 0.6);
        top: 10px;
      }

      .unit .time-label {
        font-size: clamp(8px, 2vw, 14px);
        color: #185baa;
        font-weight: 400;
      }

      .timer .unit .box {
        background: #fff;
        padding: 5px 0px;
        border-radius: 10px;
        text-align: center;
        width: clamp(42px, 10vw, 50px);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        color: #185baa;
        font-size: clamp(14px, 3vw, 18px);
        font-weight: 600;
      }
      @media (width > 767px) {
        .decor-balloon {
          bottom: -365px;
        }
        .birthday-sale-header {
          flex-direction: row;
          padding: 10px 12px;
          gap: 32px;
          justify-content: center;
        }
        .timer {
          padding: 15px 16px;
        }
      }
      @media (width > 1023px) {
        .decor-balloon {
          bottom: -440px;
        }
      }
    </style>

<script>
  const target = document.querySelector(".timer").dataset.target;
  const targetDate = new Date(target);

  function updateTimer() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance <= 0) {
      document.getElementById("days").innerText = "00";
      document.getElementById("hours").innerText = "00";
      document.getElementById("mins").innerText = "00";
      document.getElementById("secs").innerText = "00";
      clearInterval(timer);
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const secs = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").innerText = days.toString().padStart(2, "0");
    document.getElementById("hours").innerText = hours.toString().padStart(2, "0");
    document.getElementById("mins").innerText = mins.toString().padStart(2, "0");
    document.getElementById("secs").innerText = secs.toString().padStart(2, "0");
  }

  const timer = setInterval(updateTimer, 1000);
  updateTimer();
</script>
